<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>For Letho ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,
#f8f3ee,
#efe7df
);

font-family:Georgia;
}

.card{

width:85%;
max-width:700px;

padding:40px;

background:white;

border-radius:30px;

text-align:center;

box-shadow:
0 10px 40px rgba(0,0,0,.08);

}

h1{

font-size:40px;

color:#8c6b5a;

}

.message{

font-size:18px;

line-height:1.8;

color:#444;

}

.question{

margin-top:30px;

font-size:32px;

color:#a36c5f;

}

button{

padding:15px 35px;

margin:20px;

border:none;

border-radius:999px;

font-size:18px;

cursor:pointer;

}

.yes{

background:#cfa58d;

color:white;

}

.think{

background:#ece4dc;

}

.hidden{

display:none;

}

#answer{

font-size:24px;

margin-top:30px;

color:#8c6b5a;

}

</style>
</head>

<body>

<div class="card">

<h1>Dear Letho</h1>

<p class="message">

Since February, getting to know you has become one of my favourite things.

I admire your intelligence,
your spirit,
and how you tell stories in a way that stays with me.

I don't know what the future looks like—

but I know I want to ask this.

</p>

<div class="question">

Will you be my answered prayer? ❤️

</div>

<button class="yes" onclick="yes()">
Yes ❤️
</button>

<button class="think">
I need a moment 🥹
</button>

<div id="answer"></div>

</div>

<script>

function yes(){

document.getElementById(
"answer"
).innerHTML=

"Best decision of 2026 😭❤️";

}

</script>

</body>

</html>
